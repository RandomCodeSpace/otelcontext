# GoReleaser config — release ARTIFACTS + signing for OtelContext.
# Triggered by the `release.yml` workflow on a `v*` tag push (the tag is cut by
# scripts/release.sh, which also builds + embeds the React UI into the tagged
# commit). See CLAUDE.md "Security & Supply Chain" for the split of duties.
#
# OSS-only (cost $0): GoReleaser OSS v2, cosign (keyless OIDC), syft for SBOMs.
# No Pro-only keys are used. Validate locally with `goreleaser check`.
version: 2

project_name: otelcontext

# The UI must already be built into internal/ui/dist before this runs — the
# binary embeds it via `//go:embed all:dist`. release.yml runs `npm ci &&
# npm run build` in ui/ before invoking goreleaser; this hook just fails loudly
# if that step was skipped (e.g. a local `goreleaser release` without the UI).
before:
  hooks:
    - sh -c 'test -f internal/ui/dist/index.html || { echo "internal/ui/dist not built — run (cd ui && npm ci && npm run build) first" >&2; exit 1; }'

builds:
  - id: otelcontext
    binary: otelcontext
    main: .
    # Pure-Go SQLite driver → no cgo; required for cross-compilation here.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: otelcontext
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive-sbom
    artifacts: archive

# Sign the checksums file with cosign keyless (Sigstore OIDC). Signing the
# checksums file transitively covers every archive listed in it, so a single
# .sig + .pem pair attaches to the release and Scorecard's Signed-Releases
# check is satisfied. id-token: write must be granted to the release job.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature
      - "${signature}"
      - --output-certificate
      - "${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

release:
  # scripts/release.sh --release may already have created the GitHub release for
  # this tag (with notes, no artifacts). `append` adds goreleaser's artifacts to
  # that existing release instead of failing on "release already exists". If the
  # release does not yet exist, goreleaser creates it.
  mode: append
  # Mark the GitHub release as a pre-release when the tag carries a pre-release
  # identifier (e.g. v0.4.0-beta.1). Without this, append mode resets the
  # release to a full (latest) release even for beta tags.
  prerelease: auto

changelog:
  # release.sh owns the human-facing release notes; keep goreleaser's autogenerated
  # changelog out of the way so the two don't fight over the release body.
  disable: true
