{{define "header"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>(function(){var t=localStorage.getItem('OtelContext-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
    <style>
        :root, [data-theme="dark"] {
            --bg-base:    #000;
            --bg-nav:     #0a0a0a;
            --bg-panel:   #0f0f0f;
            --bg-card:    #0a0a0a;
            --bg-input:   #050505;
            --border:     #1f1f1f;
            --border-hover: #2a2a2a;
            --border-strong: #333;
            --text-primary:   #fff;
            --text-secondary: #ccc;
            --text-muted:     #666;
            --text-dim:       #444;
            --text-faint:     #333;
            --nav-active-bg:     #1a1a1a;
            --nav-active-border: #2a2a2a;
            --nav-active-text:   #fff;
            --nav-inactive-text: #666;
            --accent-error: #ff4444;
            --code-bg:   #050505;
            --code-text: #ccc;
            --syntax-key:  #93c5fd;
            --syntax-str:  #86efac;
            --syntax-bool: #fcd34d;
            --syntax-null: #94a3b8;
            --syntax-num:  #67e8f9;
        }
        [data-theme="light"] {
            --bg-base:    #f5f5f5;
            --bg-nav:     #ffffff;
            --bg-panel:   #ffffff;
            --bg-card:    #f0f0f0;
            --bg-input:   #f8f8f8;
            --border:     #e5e5e5;
            --border-hover: #d0d0d0;
            --border-strong: #bbb;
            --text-primary:   #111;
            --text-secondary: #333;
            --text-muted:     #777;
            --text-dim:       #aaa;
            --text-faint:     #bbb;
            --nav-active-bg:     #ebebeb;
            --nav-active-border: #d0d0d0;
            --nav-active-text:   #111;
            --nav-inactive-text: #777;
            --accent-error: #cc2222;
            --code-bg:   #0a0a0a;
            --code-text: #ccc;
            --syntax-key:  #93c5fd;
            --syntax-str:  #86efac;
            --syntax-bool: #fcd34d;
            --syntax-null: #94a3b8;
            --syntax-num:  #67e8f9;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

        /* Theme icon visibility */
        [data-theme="dark"]  .icon-sun  { display: flex; }
        [data-theme="dark"]  .icon-moon { display: none; }
        [data-theme="light"] .icon-sun  { display: none; }
        [data-theme="light"] .icon-moon { display: flex; }
    </style>
</head>
<body style="background:var(--bg-base);color:var(--text-secondary);display:flex;flex-direction:column;height:100vh;overflow:hidden">

    <!-- Top Nav -->
    <nav style="height:48px;flex-shrink:0;background:var(--bg-nav);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:.25rem;z-index:20">
        <!-- Logo -->
        <a href="/" style="display:flex;align-items:center;gap:.5rem;padding-right:1rem;margin-right:.25rem;border-right:1px solid var(--border);text-decoration:none;flex-shrink:0">
            <svg style="width:18px;height:18px;color:var(--text-primary)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <span style="font-weight:700;letter-spacing:.18em;font-size:.8rem;color:var(--text-primary)">OtelContext</span>
        </a>

        <!-- Nav Links -->
        <a href="/" style="display:flex;align-items:center;gap:.4rem;padding:.35rem .75rem;border-radius:6px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .15s;
            {{if eq .Title "Dashboard - OtelContext"}}background:var(--nav-active-bg);color:var(--nav-active-text);border:1px solid var(--nav-active-border){{else}}color:var(--nav-inactive-text);border:1px solid transparent{{end}}">
            <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <a href="/services" style="display:flex;align-items:center;gap:.4rem;padding:.35rem .75rem;border-radius:6px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .15s;
            {{if eq .Title "Services - OtelContext"}}background:var(--nav-active-bg);color:var(--nav-active-text);border:1px solid var(--nav-active-border){{else}}color:var(--nav-inactive-text);border:1px solid transparent{{end}}">
            <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            Services
        </a>
        <a href="/mcp-console" style="display:flex;align-items:center;gap:.4rem;padding:.35rem .75rem;border-radius:6px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .15s;
            {{if eq .Title "MCP Console - OtelContext"}}background:var(--nav-active-bg);color:var(--nav-active-text);border:1px solid var(--nav-active-border){{else}}color:var(--nav-inactive-text);border:1px solid transparent{{end}}">
            <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            MCP Console
        </a>

        <div style="flex:1"></div>
        <span style="font-size:.7rem;font-family:ui-monospace,monospace;color:var(--text-faint)">v5.4</span>

        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" title="Toggle light/dark theme"
            style="width:32px;height:32px;border-radius:6px;margin-left:.5rem;background:none;display:flex;align-items:center;justify-content:center;color:var(--text-dim);border:1px solid var(--border);cursor:pointer;transition:all .15s"
            onmouseover="this.style.borderColor='var(--border-hover)';this.style.color='var(--text-muted)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-dim)'">
            <!-- Sun icon (shown in dark mode) -->
            <svg class="icon-sun" style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg class="icon-moon" style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
        </button>
    </nav>

    <!-- Main Content -->
    <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-base);position:relative">
        <div style="flex:1;overflow:auto;padding:2rem;position:relative">

<script>
function toggleTheme() {
    var html = document.documentElement;
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('OtelContext-theme', next);
}
</script>
{{end}}
