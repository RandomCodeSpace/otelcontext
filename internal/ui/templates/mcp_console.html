{{template "header" .}}

<style>
/* MCP Console local overrides */
.mc-status-bar { display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;padding:.6rem 1.25rem;flex-shrink:0;background:var(--bg-panel);border-bottom:1px solid var(--border); }
.mc-badge { font-size:.65rem;font-weight:600;padding:.2rem .55rem;border-radius:4px;font-family:ui-monospace,monospace;letter-spacing:.08em;background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border); }
.mc-btn-primary { display:flex;align-items:center;gap:.4rem;padding:.35rem .9rem;border-radius:6px;font-size:.78rem;font-weight:600;border:1px solid var(--border-hover);background:var(--bg-panel);color:var(--text-secondary);cursor:pointer;transition:all .15s; }
.mc-btn-primary:hover { background:var(--bg-card);color:var(--text-primary);border-color:var(--border-strong); }
.mc-btn-icon { width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;transition:all .15s; }
.mc-btn-icon:hover { border-color:var(--border-hover);color:var(--text-muted); }
.mc-dropdown { position:absolute;right:0;top:calc(100% + 4px);min-width:200px;border-radius:10px;border:1px solid var(--border);background:var(--bg-panel);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:30;overflow:hidden; }
.mc-dropdown-item { width:100%;display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;font-size:.8rem;background:none;border:none;cursor:pointer;color:var(--text-secondary);text-align:left;transition:background .12s; }
.mc-dropdown-item:hover { background:var(--bg-card);color:var(--text-primary); }
.mc-dropdown-divider { border-top:1px solid var(--border);margin:.25rem 0; }
.mc-tool-card { background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:.9rem;position:relative;overflow:hidden;transition:border-color .15s,box-shadow .15s; }
.mc-tool-card:hover { border-color:var(--border-hover);box-shadow:0 0 12px rgba(255,255,255,.03); }
.mc-tool-accent { position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--border-strong),var(--border-hover));border-radius:10px 10px 0 0; }
.mc-param-tag { font-family:ui-monospace,monospace;font-size:.62rem;padding:.12rem .35rem;border-radius:4px;background:var(--bg-card);border:1px solid var(--border); }
.mc-param-req { border-color:var(--border-hover);color:var(--text-secondary); }
.mc-param-opt { color:var(--text-dim); }
.mc-btn-call { font-size:.7rem;padding:.3rem .7rem;border-radius:6px;background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border-hover);cursor:pointer;font-weight:600;transition:background .12s; }
.mc-btn-call:hover { background:var(--bg-panel);color:var(--text-primary);border-color:var(--border-strong); }
.mc-btn-rpc { font-family:ui-monospace,monospace;font-size:.7rem;padding:.3rem .7rem;border-radius:6px;background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border);cursor:pointer;font-weight:600;transition:background .12s; }
.mc-btn-rpc:hover { background:var(--bg-panel);color:var(--text-secondary); }
/* Modal overlay */
.mc-overlay { position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:rgba(0,0,0,.7);backdrop-filter:blur(4px); }
.mc-modal { position:relative;border-radius:14px;border:1px solid var(--border-hover);background:var(--bg-panel);box-shadow:0 24px 64px rgba(0,0,0,.6); }
/* Code / JSON areas always dark */
.mc-code { background:#050505;color:var(--code-text);border:1px solid var(--border);border-radius:8px;font-family:ui-monospace,monospace;font-size:.75rem; }
.mc-textarea { width:100%;background:#050505;color:#86efac;border:1px solid var(--border);border-radius:8px;font-family:ui-monospace,monospace;font-size:.74rem;padding:.6rem .75rem;resize:none;outline:none;transition:border-color .15s; }
.mc-textarea:focus { border-color:var(--border-hover); }
.mc-send-btn { width:100%;padding:.6rem;font-size:.82rem;font-weight:700;border-radius:8px;background:var(--text-primary);color:var(--bg-base);border:none;cursor:pointer;transition:opacity .15s; }
.mc-send-btn:hover { opacity:.85; }
.mc-send-btn:disabled { opacity:.4;cursor:not-allowed; }
/* Method select */
.mc-method-select { padding:.25rem .5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:.72rem;font-family:ui-monospace,monospace;color:var(--text-secondary);outline:none;cursor:pointer; }
.mc-copy-btn { display:flex;align-items:center;gap:.35rem;font-size:.72rem;padding:.25rem .6rem;border-radius:5px;background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border);cursor:pointer;transition:all .12s; }
.mc-copy-btn:hover { color:var(--text-secondary);border-color:var(--border-hover); }
</style>

<div style="position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden">

    <!-- Status Bar -->
    <div class="mc-status-bar">
        <div style="display:flex;align-items:center;gap:.5rem">
            <span id="status-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text-dim);flex-shrink:0"></span>
            <span id="status-text" style="font-size:.78rem;color:var(--text-muted)">Connecting…</span>
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--text-dim)">
            <span>Endpoint:</span>
            <code id="endpoint-url" style="font-family:ui-monospace,monospace;font-size:.72rem;padding:.15rem .4rem;border-radius:4px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary)"></code>
        </div>
        <span class="mc-badge">HTTP Streamable MCP · JSON-RPC 2.0</span>

        <div style="margin-left:auto;display:flex;align-items:center;gap:.5rem">
            <!-- AI Agent dropdown -->
            <div style="position:relative" id="agent-dropdown-wrap">
                <button onclick="toggleAgentMenu()" class="mc-btn-primary">
                    <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    Connect AI Agent
                    <svg style="width:11px;height:11px;opacity:.6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div id="agent-menu" class="mc-dropdown" style="display:none">
                    <button onclick="showAgentConfig('claude')" class="mc-dropdown-item">
                        <svg style="width:14px;height:14px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                        Claude Code / Claude.ai
                    </button>
                    <button onclick="showAgentConfig('cursor')" class="mc-dropdown-item">
                        <svg style="width:14px;height:14px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        Cursor / VS Code
                    </button>
                    <button onclick="showAgentConfig('windsurf')" class="mc-dropdown-item">
                        <svg style="width:14px;height:14px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h.5A2.5 2.5 0 0022 5.5V3.935"/></svg>
                        Windsurf
                    </button>
                    <button onclick="showAgentConfig('continue')" class="mc-dropdown-item">
                        <svg style="width:14px;height:14px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Continue.dev
                    </button>
                    <div class="mc-dropdown-divider"></div>
                    <button onclick="showAgentConfig('http')" class="mc-dropdown-item">
                        <svg style="width:14px;height:14px;flex-shrink:0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        Generic HTTP Client
                    </button>
                </div>
            </div>

            <!-- Reconnect -->
            <button onclick="initializeMCP()" title="Reconnect" class="mc-btn-icon" id="reconnect-btn">
                <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
        </div>
    </div>

    <!-- Tool List -->
    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div style="padding:.6rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg-base)">
            <span style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim)">Available Tools</span>
            <span id="tool-count" style="font-size:.7rem;font-family:ui-monospace,monospace;padding:.15rem .5rem;border-radius:4px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border)">—</span>
        </div>
        <div id="tool-list" style="flex:1;overflow:auto;padding:1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem;align-content:start">
            <div style="grid-column:1/-1;text-align:center;padding:3rem;font-size:.82rem;color:var(--text-dim)">Loading tools…</div>
        </div>
    </div>

</div>

<!-- Tool Call Modal -->
<div id="tool-call-panel" class="mc-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="mc-modal" style="width:100%;max-width:680px;max-height:82vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">
        <div style="padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
            <div>
                <div style="font-size:.82rem;font-weight:600;color:var(--text-primary)">Call: <span id="selected-tool-name" style="font-family:ui-monospace,monospace;color:var(--text-secondary)"></span></div>
                <div id="selected-tool-desc" style="font-size:.7rem;color:var(--text-muted);margin-top:.2rem"></div>
            </div>
            <button onclick="document.getElementById('tool-call-panel').style.display='none'"
                style="width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:1rem"
                onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-dim)'">&times;</button>
        </div>
        <div style="padding:1.25rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem;overflow:auto;flex:1">
            <div style="display:flex;flex-direction:column;gap:.5rem">
                <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)">Arguments <span style="color:var(--text-faint)">(JSON)</span></label>
                <textarea id="tool-args" rows="10" spellcheck="false" class="mc-textarea" style="flex:1"></textarea>
                <button onclick="callSelectedTool()" class="mc-send-btn">Execute Tool</button>
            </div>
            <div style="display:flex;flex-direction:column;gap:.5rem">
                <label style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)">Result</label>
                <pre id="tool-result" class="mc-code" style="flex:1;padding:.75rem;overflow:auto;white-space:pre-wrap;line-height:1.55;min-height:10rem"><span style="color:var(--text-dim)">—</span></pre>
            </div>
        </div>
    </div>
</div>

<!-- JSON-RPC Popup -->
<div id="rpc-popup" class="mc-overlay" style="display:none" onclick="closeRPCPopup(event)">
    <div class="mc-modal" style="width:100%;max-width:960px;height:88vh;display:flex;flex-direction:column" onclick="event.stopPropagation()">

        <!-- Header -->
        <div style="display:flex;align-items:center;gap:.75rem;padding:.9rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0">
            <div style="width:34px;height:34px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border-hover);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg style="width:15px;height:15px;color:var(--text-secondary)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
                    <span id="rpc-popup-title" style="font-weight:700;font-family:ui-monospace,monospace;font-size:.85rem;color:var(--text-primary)"></span>
                    <span id="rpc-popup-method-badge" class="mc-badge">tools/call</span>
                </div>
                <div id="rpc-popup-desc" style="font-size:.7rem;color:var(--text-muted);margin-top:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
            </div>
            <button onclick="closeRPCPopup()"
                style="width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:.9rem"
                onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-dim)'">
                <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Body: side-by-side -->
        <div style="flex:1;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;border-top:none">

            <!-- Request side -->
            <div style="display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .9rem;border-bottom:1px solid var(--border);flex-shrink:0">
                    <div style="display:flex;align-items:center;gap:.6rem">
                        <span style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)">Request</span>
                        <select id="rpc-popup-method" onchange="onRPCMethodChange()" class="mc-method-select">
                            <option value="tools/call">tools/call</option>
                            <option value="tools/list">tools/list</option>
                            <option value="initialize">initialize</option>
                            <option value="ping">ping</option>
                            <option value="resources/list">resources/list</option>
                            <option value="custom">— custom —</option>
                        </select>
                    </div>
                    <button id="rpc-copy-btn" onclick="copyRPCReq()" class="mc-copy-btn">
                        <svg style="width:11px;height:11px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        Copy
                    </button>
                </div>
                <div style="flex:1;padding:.75rem;display:flex;flex-direction:column;min-height:0">
                    <textarea id="rpc-popup-req" spellcheck="false" class="mc-textarea" style="flex:1;min-height:0"></textarea>
                </div>
                <div style="padding:0 .75rem .75rem;flex-shrink:0">
                    <button id="rpc-send-btn" onclick="sendRPCPopup()" class="mc-send-btn">Send →</button>
                </div>
            </div>

            <!-- Response side -->
            <div style="display:flex;flex-direction:column;overflow:hidden">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .9rem;border-bottom:1px solid var(--border);flex-shrink:0">
                    <span style="font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)">Response</span>
                    <span id="rpc-popup-time" style="font-size:.7rem;color:var(--text-muted);font-family:ui-monospace,monospace"></span>
                </div>
                <div style="flex:1;overflow:auto;padding:.75rem">
                    <pre id="rpc-popup-resp" style="min-height:100%;font-size:.74rem;font-family:ui-monospace,monospace;white-space:pre-wrap;line-height:1.55;color:var(--text-muted)">—</pre>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Agent Config Modal -->
<div id="agent-modal" class="mc-overlay" style="display:none" onclick="closeAgentModal(event)">
    <div class="mc-modal" style="width:100%;max-width:480px" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;gap:.75rem;padding:.9rem 1.25rem;border-bottom:1px solid var(--border)">
            <div id="modal-icon" style="width:34px;height:34px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border-hover);display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
                <div id="modal-title" style="font-size:.85rem;font-weight:700;color:var(--text-primary)"></div>
                <div id="modal-subtitle" style="font-size:.7rem;color:var(--text-muted);margin-top:.15rem"></div>
            </div>
            <button onclick="closeAgentModal()"
                style="width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);cursor:pointer"
                onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-dim)'">
                <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div style="padding:1.25rem;display:flex;flex-direction:column;gap:.75rem">
            <p id="modal-instruction" style="font-size:.8rem;color:var(--text-secondary)"></p>
            <div style="position:relative">
                <pre id="modal-config" class="mc-code" style="padding:1rem;overflow-x:auto;white-space:pre;line-height:1.55;color:#86efac"></pre>
                <button onclick="copyConfig()" id="copy-btn" class="mc-copy-btn" style="position:absolute;top:.6rem;right:.6rem">
                    <svg style="width:11px;height:11px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    Copy
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const MCP_PATH = '{{.MCPPath}}';
const baseURL = window.location.origin + MCP_PATH;
let rpcId = 10;
let toolsData = [];

document.getElementById('endpoint-url').textContent = baseURL;

// ── Agent configs ──────────────────────────────────────────────────────────────
const AGENTS = {
    claude: {
        title: 'Claude Code / Claude.ai',
        subtitle: 'Add to claude_desktop_config.json or .mcp.json',
        instruction: 'Add the following to your Claude configuration file:',
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>',
        config: () => JSON.stringify({ mcpServers: { OtelContext: { type: "http", url: baseURL } } }, null, 2),
    },
    cursor: {
        title: 'Cursor / VS Code',
        subtitle: 'Add to .cursor/mcp.json or .vscode/mcp.json',
        instruction: 'Add the following MCP server entry to your Cursor or VS Code settings:',
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>',
        config: () => JSON.stringify({ mcpServers: { OtelContext: { url: baseURL, transport: "http" } } }, null, 2),
    },
    windsurf: {
        title: 'Windsurf',
        subtitle: 'Add to ~/.codeium/windsurf/mcp_config.json',
        instruction: 'Add the following to your Windsurf MCP configuration:',
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h.5A2.5 2.5 0 0022 5.5V3.935"/>',
        config: () => JSON.stringify({ mcpServers: { OtelContext: { serverUrl: baseURL, transport: "streamable-http" } } }, null, 2),
    },
    continue: {
        title: 'Continue.dev',
        subtitle: 'Add to ~/.continue/config.json',
        instruction: 'Add the following to the mcpServers array in your Continue config:',
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>',
        config: () => JSON.stringify({ name: "OtelContext", transport: { type: "http", url: baseURL } }, null, 2),
    },
    http: {
        title: 'Generic HTTP MCP Client',
        subtitle: 'Any MCP-compatible client over HTTP Streamable',
        instruction: 'Send a POST request to the endpoint with a JSON-RPC 2.0 body:',
        icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>',
        config: () => `POST ${baseURL}\nContent-Type: application/json\n\n${JSON.stringify({"jsonrpc":"2.0","id":1,"method":"tools/list"}, null, 2)}`,
    },
};

function toggleAgentMenu() {
    const m = document.getElementById('agent-menu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', e => {
    if (!document.getElementById('agent-dropdown-wrap').contains(e.target))
        document.getElementById('agent-menu').style.display = 'none';
});

function showAgentConfig(key) {
    document.getElementById('agent-menu').style.display = 'none';
    const a = AGENTS[key]; if (!a) return;
    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-subtitle').textContent = a.subtitle;
    document.getElementById('modal-instruction').textContent = a.instruction;
    document.getElementById('modal-config').textContent = a.config();
    document.getElementById('modal-icon').innerHTML = `<svg style="width:16px;height:16px;color:var(--text-secondary)" fill="none" stroke="currentColor" viewBox="0 0 24 24">${a.icon}</svg>`;
    resetCopyBtn();
    document.getElementById('agent-modal').style.display = 'flex';
}

function closeAgentModal(e) {
    if (e && e.target !== document.getElementById('agent-modal')) return;
    document.getElementById('agent-modal').style.display = 'none';
}

function resetCopyBtn() {
    const btn = document.getElementById('copy-btn');
    btn.innerHTML = `<svg style="width:11px;height:11px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy`;
    btn.style.color = ''; btn.style.background = ''; btn.style.borderColor = '';
}

function copyConfig() {
    navigator.clipboard.writeText(document.getElementById('modal-config').textContent).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.innerHTML = `<svg style="width:11px;height:11px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!`;
        btn.style.color = '#4ade80'; btn.style.borderColor = '#166534';
        setTimeout(resetCopyBtn, 2000);
    });
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAgentModal(); closeRPCPopup(); }
});

// ── MCP Connection ─────────────────────────────────────────────────────────────
async function rpc(method, params) {
    const body = { jsonrpc: "2.0", id: rpcId++, method };
    if (params) body.params = params;
    const resp = await fetch(baseURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    return resp.json();
}

const STATUS_COLORS = { green:'#22c55e', yellow:'#eab308', red:'#ef4444', gray:'#555' };
function setStatus(color, text) {
    const c = STATUS_COLORS[color] || STATUS_COLORS.gray;
    document.getElementById('status-dot').style.background = c;
    const txt = document.getElementById('status-text');
    txt.textContent = text;
    txt.style.color = c;
}

async function initializeMCP() {
    try {
        setStatus('yellow', 'Connecting…');
        await rpc('initialize', {
            protocolVersion: '2024-11-05',
            capabilities: {},
            clientInfo: { name: 'OtelContext UI', version: '1.0' }
        });
        setStatus('green', 'Connected');
        await loadTools();
    } catch (e) {
        setStatus('red', 'Connection failed: ' + e.message);
        document.getElementById('tool-list').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;font-size:.82rem;color:#ef4444">Could not reach MCP endpoint.<br><span style="color:var(--text-muted)">${escHtml(e.message)}</span></div>`;
    }
}

async function loadTools() {
    try {
        const resp = await rpc('tools/list');
        if (resp.error) throw new Error(resp.error.message);
        toolsData = resp.result.tools || [];
        document.getElementById('tool-count').textContent = toolsData.length + ' tools';
        renderTools(toolsData);
        setStatus('green', 'Connected · ' + toolsData.length + ' tools loaded');
    } catch(e) {
        document.getElementById('tool-list').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;font-size:.82rem;color:#ef4444">Error: ${escHtml(e.message)}</div>`;
    }
}

function buildDefaultArgs(tool) {
    const args = {};
    if (tool.inputSchema && tool.inputSchema.properties) {
        for (const [k, v] of Object.entries(tool.inputSchema.properties)) {
            const req = tool.inputSchema.required && tool.inputSchema.required.includes(k);
            args[k] = req ? (v.type === 'number' ? 0 : v.type === 'boolean' ? false : '') : null;
        }
    }
    return args;
}

function renderTools(tools) {
    const container = document.getElementById('tool-list');
    if (!tools.length) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;font-size:.82rem;color:var(--text-muted)">No tools available</div>';
        return;
    }
    container.innerHTML = tools.map(t => {
        const params = t.inputSchema && t.inputSchema.properties
            ? Object.entries(t.inputSchema.properties).map(([k, v]) => {
                const req = t.inputSchema.required && t.inputSchema.required.includes(k);
                return `<span class="mc-param-tag ${req ? 'mc-param-req' : 'mc-param-opt'}">${escHtml(k)}<span style="opacity:.5">:${v.type||'any'}</span></span>`;
              }).join('')
            : '';
        return `
        <div class="mc-tool-card">
            <div class="mc-tool-accent"></div>
            <div style="font-family:ui-monospace,monospace;font-size:.8rem;font-weight:700;color:var(--text-secondary);margin-bottom:.35rem">${escHtml(t.name)}</div>
            <p style="font-size:.7rem;color:var(--text-muted);line-height:1.5;margin-bottom:.65rem">${escHtml(t.description)}</p>
            ${params ? `<div style="display:flex;flex-wrap:wrap;gap:.2rem;margin-bottom:.65rem">${params}</div>` : ''}
            <div style="display:flex;gap:.35rem">
                <button onclick="selectTool('${escAttr(t.name)}')" class="mc-btn-call">Call</button>
                <button onclick="openToolRPC('${escAttr(t.name)}')" class="mc-btn-rpc">JSON-RPC</button>
            </div>
        </div>`;
    }).join('');
}

// ── Per-tool JSON-RPC popup ────────────────────────────────────────────────────
const RPC_POPUP_TEMPLATES = {
    'tools/call':     (name, args) => ({ jsonrpc:"2.0", id:1, method:"tools/call", params:{ name, arguments: args } }),
    'tools/list':     ()           => ({ jsonrpc:"2.0", id:1, method:"tools/list" }),
    'initialize':     ()           => ({ jsonrpc:"2.0", id:1, method:"initialize", params:{ protocolVersion:"2024-11-05", capabilities:{}, clientInfo:{ name:"test", version:"1.0" } } }),
    'ping':           ()           => ({ jsonrpc:"2.0", id:1, method:"ping" }),
    'resources/list': ()           => ({ jsonrpc:"2.0", id:1, method:"resources/list" }),
};

let _rpcPopupTool = null;

function openToolRPC(name) {
    const tool = toolsData.find(t => t.name === name); if (!tool) return;
    _rpcPopupTool = tool;
    const args = buildDefaultArgs(tool);
    const req = RPC_POPUP_TEMPLATES['tools/call'](name, args);
    document.getElementById('rpc-popup-title').textContent = name;
    document.getElementById('rpc-popup-desc').textContent = tool.description;
    document.getElementById('rpc-popup-method').value = 'tools/call';
    document.getElementById('rpc-popup-method-badge').textContent = 'tools/call';
    document.getElementById('rpc-popup-req').value = JSON.stringify(req, null, 2);
    setHTML('rpc-popup-resp', '<span style="color:var(--text-dim)">—</span>');
    document.getElementById('rpc-popup-time').textContent = '';
    document.getElementById('rpc-popup').style.display = 'flex';
}

function onRPCMethodChange() {
    const method = document.getElementById('rpc-popup-method').value;
    document.getElementById('rpc-popup-method-badge').textContent = method === 'custom' ? 'custom' : method;
    if (method === 'custom') return;
    const name = _rpcPopupTool ? _rpcPopupTool.name : 'tool_name';
    const args = _rpcPopupTool ? buildDefaultArgs(_rpcPopupTool) : {};
    const tmpl = method === 'tools/call'
        ? RPC_POPUP_TEMPLATES['tools/call'](name, args)
        : (RPC_POPUP_TEMPLATES[method] || (() => ({ jsonrpc:"2.0", id:1, method })))();
    document.getElementById('rpc-popup-req').value = JSON.stringify(tmpl, null, 2);
}

function closeRPCPopup(e) {
    if (e && e.target !== document.getElementById('rpc-popup')) return;
    document.getElementById('rpc-popup').style.display = 'none';
}

async function sendRPCPopup() {
    const bodyText = document.getElementById('rpc-popup-req').value;
    let body;
    try { body = JSON.parse(bodyText); }
    catch(e) { document.getElementById('rpc-popup-resp').textContent = 'Invalid JSON: ' + e.message; return; }

    const btn = document.getElementById('rpc-send-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    setHTML('rpc-popup-resp', `<span style="color:var(--text-dim)">Sending…</span>`);
    const t0 = performance.now();
    try {
        const resp = await fetch(baseURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const ms = (performance.now() - t0).toFixed(0);
        const data = await resp.json();
        document.getElementById('rpc-popup-time').textContent = ms + 'ms · HTTP ' + resp.status;
        setHTML('rpc-popup-resp', colorJSON(data));
    } catch(e) {
        setHTML('rpc-popup-resp', escHtml('Fetch error: ' + e.message));
    } finally {
        btn.disabled = false; btn.textContent = 'Send →';
    }
}

function copyRPCReq() {
    navigator.clipboard.writeText(document.getElementById('rpc-popup-req').value).then(() => {
        const btn = document.getElementById('rpc-copy-btn');
        const orig = btn.innerHTML;
        btn.textContent = '✓ Copied';
        btn.style.color = '#4ade80'; btn.style.borderColor = '#166534';
        setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
    });
}

function selectTool(name) {
    const tool = toolsData.find(t => t.name === name);
    if (!tool) return;
    document.getElementById('selected-tool-name').textContent = name;
    document.getElementById('selected-tool-desc').textContent = tool.description;
    const args = {};
    if (tool.inputSchema && tool.inputSchema.properties) {
        for (const [k, v] of Object.entries(tool.inputSchema.properties)) {
            if (tool.inputSchema.required && tool.inputSchema.required.includes(k)) {
                args[k] = v.type === 'number' ? 0 : '';
            }
        }
    }
    document.getElementById('tool-args').value = JSON.stringify(args, null, 2);
    setHTML('tool-result', '<span style="color:var(--text-dim)">—</span>');
    document.getElementById('tool-call-panel').style.display = 'flex';
}

async function callSelectedTool() {
    const name = document.getElementById('selected-tool-name').textContent;
    let args = {};
    try {
        args = JSON.parse(document.getElementById('tool-args').value || '{}');
    } catch(e) {
        setHTML('tool-result', escHtml('Invalid JSON: ' + e.message));
        return;
    }
    setHTML('tool-result', `<span style="color:var(--text-dim)">Calling…</span>`);
    try {
        const resp = await rpc('tools/call', { name, arguments: args });
        setHTML('tool-result', colorJSON(resp.result || resp.error));
    } catch(e) {
        setHTML('tool-result', escHtml('Error: ' + e.message));
    }
}

// ── JSON syntax highlighting ───────────────────────────────────────────────────
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
    return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
function colorJSON(data) {
    const raw = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    return escHtml(raw).replace(
        /(&quot;(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\&])*&quot;(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        match => {
            if (/^&quot;/.test(match)) {
                if (/:$/.test(match)) return `<span style="color:var(--syntax-key)">${match}</span>`;
                return `<span style="color:var(--syntax-str)">${match}</span>`;
            }
            if (/true|false/.test(match)) return `<span style="color:var(--syntax-bool)">${match}</span>`;
            if (/null/.test(match))       return `<span style="color:var(--syntax-null)">${match}</span>`;
            return `<span style="color:var(--syntax-num)">${match}</span>`;
        }
    );
}
function setHTML(id, html) {
    document.getElementById(id).innerHTML = html;
}

window.addEventListener('DOMContentLoaded', () => initializeMCP());
</script>
