{{ define "base" }}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a', /* slate 900 */
                        card: '#1e293b', /* slate 800 */
                        primary: '#3b82f6', /* border/focus */
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-card/80 backdrop-blur-md border border-slate-700/50 rounded-xl shadow-lg;
            }
        }
        body {
            @apply bg-dark text-slate-200 antialiased selection:bg-primary/30;
            font-family: 'Inter', system-ui, sans-serif;
        }
    </style>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="sticky top-0 z-50 glass rounded-none border-x-0 border-t-0 border-b-slate-700 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tight">OtelContext</span>
        </div>
        <div class="flex gap-6 text-sm font-medium">
            <a href="/" class="hover:text-indigo-400 transition-colors {{ if eq .Title "OtelContext Dashboard" }}text-indigo-400{{ else }}text-slate-400{{ end }}">Dashboard</a>
            <a href="/traces" class="hover:text-indigo-400 transition-colors {{ if eq .Title "OtelContext Traces" }}text-indigo-400{{ else }}text-slate-400{{ end }}">Traces</a>
            <a href="/logs" class="hover:text-indigo-400 transition-colors {{ if eq .Title "OtelContext Logs" }}text-indigo-400{{ else }}text-slate-400{{ end }}">Logs</a>
        </div>
    </nav>
    <main class="flex-grow container mx-auto px-4 py-8">
        {{ template "content" . }}
    </main>
</body>
</html>
{{ end }}
